<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>罗小黑</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- 主要内容区域 -->
    <section class="wrapper">
        <div class="container">
            <!-- 视差场景容器，data-hover-only="false"表示始终应用视差效果 -->
            <div id="scene" class="scene" data-hover-only="false">
                <!-- 圆形背景元素，视差深度1.2（移动幅度最大） -->
                <div class="circle" data-depth="1.2"></div>

                <!-- test0.png 参与视差效果 -->
                <img class="pAnime top-image" data-depth="1.0" src="test0.png" style="z-index: 4;">

                <!-- 眨眼效果的黑色遮罩 - 在test0.png下方 -->
                <div class="eye-covers" style="z-index: 3;">
                    <div class="eye-cover top"></div>
                    <div class="eye-cover bottom"></div>
                </div>

                <!-- 三个图片元素，分别设置不同的视差深度和z-index -->
                <!-- test1: 深度0.9，z-index: 3（最前面） -->
                <img class="pAnime pAnime-1" data-depth="0.9" src="test1.png" style="z-index: 3;">
                <!-- test2: 深度0.6，z-index: 2（中间层） -->
                <img class="pAnime pAnime-2" data-depth="0.6" src="test2.png" style="z-index: -1;">
                <!-- test3: 深度0.3，z-index: 1（最后面） -->
                <img class="pAnime pAnime-3" data-depth="0.3" src="test3.png" style="z-index: 2;">
            </div>
        </div>
    </section>
    <!-- 主要内容区域结束 -->

    <!-- 引入必要的JavaScript库 -->
    <script src='parallax.min.js'></script>
    <script src='jquery.min.js'></script>
    <script src="./script.js"></script>

</body>

</html>
